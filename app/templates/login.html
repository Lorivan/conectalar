{% extends "base.html" %}

{% block content %}
<style>
    .login-page {
        min-height: calc(100vh - 182px);
        background: radial-gradient(circle at center, #f7f8ff 0%, #eceef6 48%, #e4e6ef 100%);
        border-top: 1px solid #e3e6f0;
        border-bottom: 1px solid #d7dbe8;
        position: relative;
        overflow: hidden;
    }

    .login-page::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(122, 129, 173, 0.12) 2px, transparent 2px),
            linear-gradient(90deg, rgba(122, 129, 173, 0.12) 2px, transparent 2px);
        background-size: 130px 130px;
        mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.25), transparent 72%);
    }

    .login-card {
        width: min(820px, 92vw);
        border: none;
        border-radius: 34px;
        overflow: hidden;
        box-shadow: 0 24px 40px rgba(28, 33, 62, 0.17);
        position: relative;
        z-index: 2;
    }

    .login-card-header {
        padding: 24px 40px;
        background: linear-gradient(120deg, #6d52ee 0%, #7f63ff 48%, #6648f2 100%);
        color: #f8f8ff;
        text-align: center;
    }

    .login-card-header h1 {
        margin: 0;
        font-size: clamp(2rem, 3vw, 3rem);
        font-weight: 700;
    }

    .login-card-body {
        padding: 34px 34px 24px;
        background: rgba(255, 255, 255, 0.94);
    }

    .login-label {
        color: #202554;
        font-size: 2.05rem;
        font-weight: 700;
        margin-bottom: 10px;
    }

    .login-input {
        border: 2px solid #656a90;
        border-radius: 24px;
        min-height: 84px;
        font-size: 2.7rem;
        color: #1a1f3c;
        padding: 10px 28px;
    }

    .login-input:focus {
        border-color: #5f66a8;
        box-shadow: 0 0 0 0.2rem rgba(113, 98, 255, 0.2);
    }

    .btn-login {
        width: 100%;
        border: none;
        border-radius: 24px;
        min-height: 86px;
        font-size: 2.8rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(120deg, #1f2372 0%, #182071 100%);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 16px rgba(32, 39, 97, 0.28);
        color: #fff;
    }

    .login-request {
        margin-top: 16px;
        text-align: center;
        font-size: 2.3rem;
        color: #202448;
    }

    .login-request a {
        color: #6b58df;
        font-weight: 700;
        text-decoration: none;
    }

    .login-footer {
        background: rgba(240, 241, 248, 0.95);
        text-align: center;
        padding: 22px 8px;
        color: #21284e;
        font-size: 1.2rem;
        border-top: 1px solid #d8dbe7;
    }

    @media (max-width: 1400px) {
        .login-label { font-size: 1.25rem; }
        .login-input { min-height: 58px; font-size: 1.6rem; }
        .btn-login { min-height: 58px; font-size: 1.8rem; }
        .login-request { font-size: 1.2rem; }
    }
</style>

<section class="login-page d-flex align-items-center justify-content-center px-2 py-4 py-lg-5">
    <div class="card login-card">
        <div class="login-card-header">
            <h1><i class="bi bi-key me-2"></i>Acesso ao Sistema</h1>
        </div>

        <div class="login-card-body">
            <form method="POST" action="">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="email" class="form-label login-label">E-mail</label>
                    <input type="email" class="form-control login-input" id="email" name="email" required placeholder="admin@conectalar.com">
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label login-label">Senha</label>
                    <input type="password" class="form-control login-input" id="senha" name="senha" required>
                </div>

                <button type="submit" class="btn btn-login">Entrar</button>
            </form>

            <p class="login-request mb-0">Não possui acesso? <a href="#">Solicite à administração.</a></p>
        </div>
    </div>
</section>

<footer class="login-footer">© 2024 ConectaLar. Todos os direitos reservados.</footer>
{% endblock %}
