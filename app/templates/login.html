{% extends "base.html" %}

{% block content %}
<style>
    .login-page {
        min-height: calc(100vh - 74px);
        background: #f8fafc;
    }

    .login-card {
        width: min(680px, 92vw);
        border: none;
        border-radius: 1rem;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }

    .login-card-body {
        padding: 2rem;
        background: #ffffff;
    }

    .login-brand {
        text-align: center;
        margin-bottom: 1.75rem;
    }

    .login-logo {
        height: 52px;
        width: auto;
        margin-bottom: 0.75rem;
    }

    .login-title {
        margin: 0;
        color: #1e293b;
        font-size: clamp(1.8rem, 2.4vw, 2.3rem);
        font-weight: 700;
    }

    .login-subtitle {
        margin: 0.5rem 0 0;
        color: #64748b;
        font-size: 1rem;
    }

    .login-label {
        color: #334155;
        font-size: 0.92rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .login-input {
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        min-height: 54px;
        font-size: 1rem;
        color: #0f172a;
        padding: 0.7rem 0.9rem;
        background-color: #ffffff;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .login-input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.18);
        background-color: #ffffff;
    }

    .password-wrapper {
        position: relative;
    }

    .password-toggle {
        position: absolute;
        right: 0.65rem;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        background: transparent;
        color: #64748b;
        padding: 0.3rem;
        line-height: 1;
    }

    .password-toggle:hover,
    .password-toggle:focus {
        color: #2563eb;
    }

    .password-input {
        padding-right: 2.5rem;
    }

    .btn-login {
        width: 100%;
        border: none;
        border-radius: 0.75rem;
        min-height: 54px;
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        background: #2563eb;
        border: 1px solid #2563eb;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-login:hover {
        background: #1d4ed8;
        border-color: #1d4ed8;
        transform: translateY(-1px);
        box-shadow: 0 10px 16px rgba(37, 99, 235, 0.28);
        color: #fff;
    }

    .login-request {
        margin-top: 1.25rem;
        text-align: center;
        font-size: 0.95rem;
        color: #475569;
    }

    .login-request a {
        color: #4f46e5;
        font-weight: 600;
        text-decoration: none;
    }

    .login-request a:hover {
        text-decoration: underline;
    }

    .login-footer {
        background: #f8fafc;
        text-align: center;
        padding: 22px 8px;
        color: #64748b;
        font-size: 1.2rem;
        border-top: 1px solid #d8dbe7;
    }

    @media (max-width: 1400px) {
        .login-card-body { padding: 1.5rem; }
        .login-title { font-size: 1.6rem; }
        .login-subtitle { font-size: 0.9rem; }
    }
</style>

<section class="login-page d-flex align-items-center justify-content-center px-3 py-4 py-lg-5">
    <div class="card login-card">
        <div class="login-card-body">
            <div class="login-brand">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo ConectaLar" class="login-logo">
                <h1 class="login-title">Acesso ao Sistema</h1>
                <p class="login-subtitle">Insira suas credenciais para entrar na plataforma.</p>
            </div>

            <form method="POST" action="">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label for="email" class="form-label login-label">E-mail</label>
                    <input type="email" class="form-control login-input" id="email" name="email" required placeholder="admin@conectalar.com">
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label login-label">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control login-input password-input" id="senha" name="senha" required>
                        <button type="button" class="password-toggle" id="toggleSenha" aria-label="Mostrar senha" aria-controls="senha" aria-pressed="false">
                            <i class="bi bi-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">Entrar</button>
            </form>

            <p class="login-request mb-0">Não possui acesso? <a href="#">Solicite à administração.</a></p>
        </div>
    </div>
</section>

<footer class="login-footer">© 2026 ConectaLar. Todos os direitos reservados.</footer>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const senhaInput = document.getElementById('senha');
        const toggleSenha = document.getElementById('toggleSenha');

        if (!senhaInput || !toggleSenha) {
            return;
        }

        toggleSenha.addEventListener('click', function () {
            const mostrando = senhaInput.type === 'text';
            senhaInput.type = mostrando ? 'password' : 'text';
            toggleSenha.setAttribute('aria-pressed', String(!mostrando));
            toggleSenha.setAttribute('aria-label', mostrando ? 'Mostrar senha' : 'Ocultar senha');
            toggleSenha.innerHTML = mostrando
                ? '<i class="bi bi-eye" aria-hidden="true"></i>'
                : '<i class="bi bi-eye-slash" aria-hidden="true"></i>';
        });
    });
</script>
{% endblock %}
