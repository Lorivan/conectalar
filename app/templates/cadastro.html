{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Cadastrar Novo Morador / Usuário</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail (Será o login)</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control" name="senha" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Unidade (Casa/Apto)</label>
                            <input type="text" class="form-control" name="unidade" placeholder="Ex: Casa 12" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Tipo de Usuário</label>
                        <select class="form-select" name="tipo">
                            <option value="morador">Morador</option>
                            <option value="sindico">Síndico / Admin</option>
                        </select>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark">Finalizar Cadastro</button>
                        <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-outline-secondary">Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
