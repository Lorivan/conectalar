<!DOCTYPE html>
<html lang="pt-BR">
<style>
    /* 1. Para textos na sua cor roxa */
    .text-roxo-conecta {
        color: #7b5cfb !important;
    }

    /* 2. Para fundos na sua cor roxa (O seu próprio "bg-primary") */
    .bg-roxo-conecta {
        background-color: #7b5cfb !important;
        color: white !important; /* O texto em cima do fundo roxo precisa ser branco para dar leitura */
    }

    /* 3. Para Botões na sua cor roxa */
    .btn-roxo-conecta {
        background-color: #1E175B !important;
        color: white !important;
        border: none;
    }

    /* Um charminho extra: quando passar o mouse em cima do botão, ele fica um roxo mais escuro */
    .btn-roxo-conecta:hover {
        background-color: #6146cf !important;
        color: white !important;
    }
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaLar - Gestão de Condomínio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/dashboard">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo ConectaLar" height="40" class="me-2">

            <span class="fw-bold text-white">ConectaLar</span>
            <span class="fs-6 text-white d-none d-md-inline ms-1 pt-1">- Plataforma para Gestão de Condomínio</span>
        </a>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
